services:
  - type: web
    name: pharma-assistant
    runtime: python
    plan: standard  # Explicitly use standard plan with 2GB RAM
    buildCommand: |
      pip install -r requirements.txt && \
      python preload_models.py && \
      python -m nltk.downloader punkt maxent_ne_chunker words averaged_perceptron_tagger
    startCommand: gunicorn -c gunicorn_config.py backend.api.server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # API Keys
      - key: PINECONE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Pinecone Configuration
      - key: PINECONE_INDEX
        value: "pharma-assistant"
      - key: PINECONE_ENVIRONMENT
        value: "us-east-1"
      - key: PINECONE_NAMESPACE
        value: "lilly"
      # Model Configuration - Use small model
      - key: EMBEDDING_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      - key: GROUNDING_EMBED_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      # With 2GB RAM, you can enable the reranker!
      - key: SKIP_RERANKER
        value: "false"
      - key: RERANKER_MODEL
        value: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      # RAG Configuration
      - key: RAG_TOPK
        value: "40"
      - key: RAG_FINALK
        value: "5"
      - key: RAG_W_RERANK
        value: "0.60"
      - key: RAG_W_LEX
        value: "0.25"
      - key: RAG_W_VEC
        value: "0.15"
      # Cache Configuration
      - key: RAG_CACHE_MAX
        value: "256"
      - key: ANS_CACHE_MAX
        value: "256"
      # Model cache paths for Render
      - key: TRANSFORMERS_CACHE
        value: "/opt/render/project/.cache/huggingface"
      - key: HF_HOME
        value: "/opt/render/project/.cache/huggingface"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/opt/render/project/.cache/torch/sentence_transformers"
      # Other settings
      - key: GROUNDING_AVG_THRESH
        value: "0.42"
      - key: GROUNDING_COVERED_FRAC
        value: "0.65"
      - key: FAIR_BALANCE_ENFORCED
        value: "true"
      - key: ANTHROPIC_MODEL
        value: "claude-3-7-sonnet-latest"