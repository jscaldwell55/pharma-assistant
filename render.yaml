services:
  - type: web
    name: pharma-assistant
    runtime: python
    plan: starter  # Explicitly use starter plan
    buildCommand: |
      pip install --no-cache-dir -r requirements.txt && \
      python preload_models.py
    startCommand: gunicorn -c gunicorn_config.py backend.api.server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # API Keys
      - key: PINECONE_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Pinecone Configuration
      - key: PINECONE_INDEX
        value: "pharma-assistant"
      - key: PINECONE_ENVIRONMENT
        value: "us-east-1"
      - key: PINECONE_NAMESPACE
        value: "lilly"
      # Model Configuration - Optimized for low memory
      - key: EMBEDDING_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      - key: GROUNDING_EMBED_MODEL
        value: "sentence-transformers/all-MiniLM-L6-v2"
      # CRITICAL: Disable reranker for Starter plan
      - key: SKIP_RERANKER
        value: "true"
      # RAG Configuration - Reduced for memory
      - key: RAG_TOPK
        value: "20"
      - key: RAG_FINALK
        value: "5"
      # Adjusted weights without reranker
      - key: RAG_W_RERANK
        value: "0.0"
      - key: RAG_W_LEX
        value: "0.50"
      - key: RAG_W_VEC
        value: "0.50"
      # Reduced cache sizes
      - key: RAG_CACHE_MAX
        value: "128"
      - key: ANS_CACHE_MAX
        value: "128"
      # Model cache paths for Render
      - key: TRANSFORMERS_CACHE
        value: "/opt/render/project/.cache/huggingface"
      - key: HF_HOME
        value: "/opt/render/project/.cache/huggingface"
      - key: SENTENCE_TRANSFORMERS_HOME
        value: "/opt/render/project/.cache/torch/sentence_transformers"
      - key: NLTK_DATA
        value: "/opt/render/project/.cache/nltk_data"
      # Other settings
      - key: GROUNDING_AVG_THRESH
        value: "0.42"
      - key: GROUNDING_COVERED_FRAC
        value: "0.65"
      - key: FAIR_BALANCE_ENFORCED
        value: "true"
      - key: ANTHROPIC_MODEL
        value: "claude-3-haiku-20240307"  # Consider using Haiku for speed/cost
      # Timeout for workers
      - key: WEB_CONCURRENCY
        value: "1"